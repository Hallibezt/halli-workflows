name: DB Schema Drift Check

# Deployment integrity gate for Supabase schemas. Runs on:
#   - every push to main (post-merge belt-and-suspenders)
#   - every PR that touches migrations, the drift script, or the allowlist
#   - daily at 07:00 UTC (scheduled canary — opens a GH issue on failure)
#   - manual workflow_dispatch for ad-hoc checks
#
# Full rationale: docs/drift-gate.md
#
# Secrets required (Settings → Secrets and variables → Actions):
#   DRIFT_DB_URL_<PROJECT>   — one per Supabase project, using the dedicated
#                              drift_reader role (pg_read_all_data, no writes)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "**/supabase/migrations/**"
      - "scripts/drift-check.ts"
      - "scripts/drift-check.allowlist.json"
      - ".github/workflows/drift-check.yml"
      - "package.json"
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  drift:
    name: Check Supabase schema drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run drift checker (human output)
        id: drift
        continue-on-error: true
        env:
          # Add one line per Supabase project in the PROJECTS array of scripts/drift-check.ts
          DRIFT_DB_URL_DEFAULT: ${{ secrets.DRIFT_DB_URL_DEFAULT }}
        run: |
          set +e
          npx tsx scripts/drift-check.ts | tee db-drift-report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run drift checker (JSON for artifact)
        if: always()
        env:
          DRIFT_DB_URL_DEFAULT: ${{ secrets.DRIFT_DB_URL_DEFAULT }}
        run: |
          npx tsx scripts/drift-check.ts --json > db-drift-report.json || true

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-drift-report-${{ github.run_id }}
          path: |
            db-drift-report.txt
            db-drift-report.json
          retention-days: 14

      - name: Fail the job when drift detected
        if: steps.drift.outputs.exit_code != '0'
        run: |
          echo "::error::Schema drift detected. See db-drift-report.txt artifact for details."
          exit 1

      - name: Open GitHub issue on failure (scheduled runs only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('db-drift-report.txt', 'utf8');
            const title = `🔴 DB Schema Drift Detected — ${new Date().toISOString().slice(0, 16)}Z`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The daily DB schema drift checker detected a mismatch between committed migrations and actual Supabase production state.`,
              ``,
              `**Workflow run:** ${runUrl}`,
              `**Runbook:** [docs/drift-gate.md](./docs/drift-gate.md)`,
              ``,
              `**Report:**`,
              ``,
              '```',
              report.slice(0, 50000),
              '```',
              ``,
              `### What to do`,
              ``,
              `1. Run locally to reproduce: \`npm run drift\``,
              `2. For each missing item: apply the migration or add to \`scripts/drift-check.allowlist.json\` with a note.`,
              `3. Re-run \`npm run drift\` and confirm exit 0.`,
              `4. Close this issue when the next scheduled run passes.`,
              ``,
              `_Auto-generated by \`.github/workflows/drift-check.yml\`_`,
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'db-drift',
              state: 'open',
              per_page: 10,
            });
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const recentIssue = existing.find((i) => new Date(i.created_at) > oneDayAgo);
            if (recentIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recentIssue.number,
                body: `Drift still present at ${new Date().toISOString()}. Latest run: ${runUrl}`,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['db-drift', 'critical', 'infra'],
            });
