name: Code-Debt Registry Check

# CLAUDE.md Rule 15 enforcement gate. Runs on:
#   - every push to main (defense in depth after pre-commit + pre-push hooks)
#   - every PR that touches source code, the scanner, or the registry
#   - daily at 07:00 UTC (scheduled canary — opens a GH issue on failure or
#     on P0/P1 debt items unresolved for >30 days)
#   - manual workflow_dispatch for ad-hoc checks
#
# Scanner: scripts/check-code-debt.ts (run via `npm run debt:check`).
# Registry: docs/code-debt-registry.md.
# Full rationale: CLAUDE.md Rule 15.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "supabase/migrations/**"
      - "scripts/check-code-debt.ts"
      - "scripts/drift-check.ts"
      - "docs/code-debt-registry.md"
      - ".github/workflows/code-debt-check.yml"
      - "package.json"
  schedule:
    # Daily at 07:00 UTC — same slot as the drift check.
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  debt-check:
    name: Check code-debt registry
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aurora-hunter-is"

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: npm ci

      - name: Run code-debt scanner (human output)
        id: debt
        continue-on-error: true
        run: |
          set +e
          npx tsx scripts/check-code-debt.ts --check | tee code-debt-report.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run code-debt scanner (JSON for artifact)
        if: always()
        run: |
          npx tsx scripts/check-code-debt.ts --json > code-debt-report.json || true

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-debt-report-${{ github.run_id }}
          path: |
            code-debt-report.txt
            code-debt-report.json
          retention-days: 14

      - name: Fail the job when violations detected
        if: steps.debt.outputs.exit_code != '0'
        run: |
          echo "::error::Code-debt violations detected. Every TODO/FIXME/hopeful-phrase comment must have a TD-XXXX entry in docs/code-debt-registry.md. See report artifact."
          exit 1

      - name: Open GitHub issue on scheduled failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('code-debt-report.txt', 'utf8');
            const title = `🟡 Code-Debt Registry Drift — ${new Date().toISOString().slice(0, 16)}Z`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The daily code-debt scanner detected violations between source comments and the registry at \`docs/code-debt-registry.md\`.`,
              ``,
              `**Workflow run:** ${runUrl}`,
              `**Runbook:** CLAUDE.md Rule 15`,
              ``,
              `**Report:**`,
              ``,
              '```',
              report.slice(0, 50000),
              '```',
              ``,
              `### What to do`,
              ``,
              `1. Run locally to reproduce:`,
              `   \`\`\``,
              `   npm run debt:check`,
              `   \`\`\``,
              `2. For each violation, choose:`,
              `   - Register the comment: \`npm run debt:add\`, then update the comment to reference the new TD-XXXX.`,
              `   - Remove the comment if the work is actually done (and mark the existing entry resolved).`,
              `   - Add \`// debt:ignore\` if the pattern is a genuine false positive (e.g., user-facing string).`,
              `3. Re-run \`npm run debt:check\` and confirm exit 0.`,
              `4. Close this issue when the next scheduled run passes.`,
              ``,
              `**Why this matters**: hopeful comments without tracking accumulate, create false confidence, and rot. The reset-and-unlink bug (2026-05-10) shipped with a documented "known limitation" that was never tracked anywhere — this gate exists so that pattern never repeats.`,
              ``,
              `_Auto-generated by \`.github/workflows/code-debt-check.yml\`_`,
            ].join('\n');
            // Dedupe: only open if no open code-debt issue from the last 24 hours
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'code-debt',
              state: 'open',
              per_page: 10,
            });
            const oneDayAgo = new Date(Date.now() - 24 * 60 * 60 * 1000);
            const recentIssue = existing.find((i) => new Date(i.created_at) > oneDayAgo);
            if (recentIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: recentIssue.number,
                body: `Debt drift still present at ${new Date().toISOString()}. Latest run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['code-debt'],
              });
            }
